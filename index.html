<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Personal fossil collection archive and database">
    <title>Fossil Archive — Personal Collection Database</title>
    <link rel="icon" type="image/png" href="img/favicon.png">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <header>
        <div class="header-inner">
            <div class="header-brand">
                <img src="img/logo.png" alt="Fossil Archive logo" class="header-logo">
                <h1>Fossil <span class="accent">Archive</span></h1>
            </div>
            <div class="header-actions">
                <button id="btn-export" class="btn-icon" onclick="app.exportData()" title="Backup Database to JSON" aria-label="Export backup">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                </button>
                <button id="btn-restore-json" class="btn-icon" onclick="document.getElementById('file-restore-json').click()" title="Restore JSON Backup" aria-label="Restore JSON backup">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                </button>
                <input type="file" id="file-restore-json" accept=".json" style="display:none;" onchange="app.importJSON(event)">

                <button id="btn-import" class="btn-icon" onclick="document.getElementById('file-import').click()" title="Import CSV" aria-label="Import CSV file">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="9" x2="9" y2="21"/><line x1="15" y1="9" x2="15" y2="21"/></svg>
                </button>
                <input type="file" id="file-import" accept=".csv" style="display:none;" onchange="app.importCSV(event)">

                <button id="btn-mass-delete" class="btn-danger" style="display:none;" onclick="app.deleteSelected()">
                    Delete Selected
                </button>

                <button class="btn-primary" onclick="app.openModal()">
                    + Add Fossil
                </button>
            </div>
        </div>
    </header>

    <nav class="filter-bar" aria-label="Filter fossils">
        <div class="filter-inner">
            <!-- Row 1: Search + View toggle -->
            <div class="filter-row">
                <div class="search-wrapper">
                    <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <input type="text" id="search" placeholder="Search specimens, notes, origin..." aria-label="Search specimens" oninput="app.renderFossils()">
                </div>

                <div class="view-toggle" role="group" aria-label="Switch between collection and wishlist">
                    <button type="button" id="btn-collection" class="toggle-btn active" onclick="app.setView('false')">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                        My Collection
                    </button>
                    <button type="button" id="btn-wishlist" class="toggle-btn" onclick="app.setView('true')">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
                        Wishlist
                    </button>
                </div>

                <button type="button" id="btn-toggle-stats" class="btn-secondary" onclick="app.toggleStats()" title="Toggle Dashboard" aria-label="Toggle Dashboard" style="margin-left: auto;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
                    Dashboard
                </button>
            </div>

            <!-- Row 2: Filters -->
            <div class="filter-row">
                <div class="form-group filter-select">
                    <label for="filter-category">Category</label>
                    <select id="filter-category" onchange="app.renderFossils()">
                        <option value="">All Categories</option>
                    </select>
                </div>

                <div class="form-group filter-select">
                    <label for="filter-period">Period</label>
                    <select id="filter-period" onchange="app.renderFossils()">
                        <option value="">All Periods</option>
                    </select>
                </div>

                <div class="form-group filter-select">
                    <label for="filter-sort">Sort By</label>
                    <select id="filter-sort" onchange="app.renderFossils()">
                        <option value="newest">Newest First</option>
                        <option value="oldest">Oldest First</option>
                        <option value="name-asc">Name A–Z</option>
                        <option value="name-desc">Name Z–A</option>
                        <option value="age-asc">Age (Youngest)</option>
                        <option value="age-desc">Age (Oldest)</option>
                        <option value="price-asc">Value (Low–High)</option>
                        <option value="price-desc">Value (High–Low)</option>
                    </select>
                </div>
            </div>
        </div>
    </nav>

    <main>
        <div id="stats-summary" class="stats-summary" aria-live="polite">
            <div id="stats-summary-text" class="stats-text" style="width: 100%;"></div>
            <div class="stats-charts">
                <div class="chart-wrapper"><canvas id="chart-country"></canvas></div>
                <div class="chart-wrapper"><canvas id="chart-period"></canvas></div>
            </div>
        </div>
        <div id="fossil-grid" class="fossil-grid" aria-live="polite">
            <!-- Fossils rendered by JS -->
        </div>
    </main>

    <!-- Fossil Form Modal -->
    <dialog id="fossil-modal" aria-labelledby="modal-title">
        <form id="fossil-form" onsubmit="app.saveFossil(event)">
            <input type="hidden" id="fossil-id">

            <div class="modal-header">
                <h2 id="modal-title">Add New Fossil</h2>
                <button type="button" class="btn-icon" aria-label="Close dialog" onclick="app.closeModal()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>

            <div class="modal-body">
                <div class="form-grid">
                    <div class="form-group full-width">
                        <label for="f-specimen">Specimen Name *</label>
                        <input type="text" id="f-specimen" required placeholder="e.g. Megalodon">
                    </div>

                    <div class="form-group full-width">
                        <label for="f-anatomy">Anatomy / Part</label>
                        <input type="text" id="f-anatomy" placeholder="e.g. Anterior Tooth, Thoracic Vertebra, Leaf Impression...">
                    </div>

                    <div class="form-group">
                        <label for="f-category">Category *</label>
                        <select id="f-category" required></select>
                    </div>

                    <div class="form-group">
                        <label for="f-wishlist">Ownership Status</label>
                        <select id="f-wishlist">
                            <option value="false">Owned</option>
                            <option value="true">Wishlist</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="f-period">Geological Period</label>
                        <select id="f-period" onchange="app.updateEpochs(); app.updateStratAges(); app.updateAgeSlider()"></select>
                    </div>

                    <div class="form-group">
                        <label for="f-epoch">Epoch</label>
                        <select id="f-epoch" onchange="app.updateStratAges()">
                            <option value="">— Select Period First —</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="f-strat-age">Age (Stage)</label>
                        <select id="f-strat-age">
                            <option value="">— Select Epoch First —</option>
                        </select>
                    </div>

                    <div class="form-group full-width">
                        <label for="f-age">Estimated Age (Million Years Ago)</label>
                        <div style="display: flex; gap: 1rem; align-items: center;">
                            <input type="number" id="f-age" step="0.01" min="0" value="0" style="width: 120px;" oninput="document.getElementById('f-age-slider').value = Math.min(this.value, 650); app.updateDropdownsFromAge();">
                            <input type="range" id="f-age-slider" min="0" max="650" value="0" step="0.1" style="flex: 1;" oninput="document.getElementById('f-age').value = this.value; app.updateDropdownsFromAge();">
                        </div>
                        <div class="slider-labels" style="margin-top: 0.25rem;">
                            <span>Present</span>
                            <span>650 Ma (Slider Max)</span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="f-country">Country of Origin</label>
                        <input type="text" id="f-country" placeholder="e.g. Morocco">
                    </div>

                    <div class="form-group">
                        <label for="f-location">Precise Location</label>
                        <input type="text" id="f-location" placeholder="e.g. Kem Kem Beds">
                    </div>

                    <div class="form-group full-width">
                        <label for="f-formation">Geological Formation</label>
                        <input type="text" id="f-formation" placeholder="e.g. Hell Creek Formation">
                    </div>

                    <div class="form-group">
                        <label for="f-size">Size</label>
                        <div class="input-with-select">
                            <input type="number" step="0.01" id="f-size" placeholder="e.g. 10">
                            <select id="f-size-unit">
                                <option value="cm">cm</option>
                                <option value="inch">inch</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="f-weight">Weight (g)</label>
                        <input type="number" step="0.1" id="f-weight" placeholder="e.g. 500">
                    </div>

                    <div class="form-group">
                        <label for="f-price">Purchase Price</label>
                        <div class="input-with-select">
                            <input type="number" step="0.01" id="f-price" placeholder="e.g. 150">
                            <select id="f-currency">
                                <option value="USD">USD</option>
                                <option value="EUR">EUR</option>
                                <option value="SEK">SEK</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group full-width">
                        <label for="f-notes">Notes</label>
                        <textarea id="f-notes" rows="3" placeholder="Condition, preparation details, provenance..."></textarea>
                    </div>

                    <div class="form-group full-width">
                        <label>Specimen Images</label>
                        <div class="upload-area" onclick="document.getElementById('f-images').click()" onkeydown="if(event.key==='Enter')document.getElementById('f-images').click()" tabindex="0" role="button" aria-label="Click to upload images">
                            <input type="file" id="f-images" accept="image/*" multiple onchange="app.handleImageUpload(event)" style="display:none;">
                            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                            <span class="upload-text">Click to upload images</span>
                            <span class="upload-hint">JPG, PNG, WEBP · Multiple allowed</span>
                        </div>
                        <div id="image-preview" class="img-preview" aria-live="polite"></div>
                    </div>
                </div>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn-secondary" onclick="app.closeModal()">Cancel</button>
                <button type="submit" class="btn-primary">Save Fossil</button>
            </div>
        </form>
    </dialog>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js" integrity="sha512-doSKIKVlMhB2hO3+YAMkFG0+bxBHSjbCOSVFcOIlqLCO6vgD0/07HL8rSfKiEx8dONBh0tyltk2NiKLMsacs0A==" crossorigin="anonymous"></script>
    <script src="js/app.js"></script>
</body>
</html>
